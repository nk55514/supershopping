<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Super Shopping</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        body { background-color: #f7f9fa; color: #333; padding-bottom: 85px; }
        header { background-color: #e63946; color: white; padding: 15px; text-align: center; font-size: 22px; font-weight: bold; position: sticky; top: 0; z-index: 100; }
        .search-container { padding: 10px 15px; background: #e63946; }
        .search-box { width: 100%; padding: 10px; border-radius: 25px; border: none; outline: none; font-size: 14px; padding-left: 15px; }
        .top-dash { background: white; margin: 12px; padding: 12px; border-radius: 12px; display: flex; justify-content: space-between; align-items: center; box-shadow: 0 2px 5px rgba(0,0,0,0.05); }
        .coin-status { display: flex; align-items: center; gap: 6px; font-size: 16px; font-weight: bold; color: #e63946; }
        .coin-status i { color: #ffd700; font-size: 20px; }
        .category-section { background: white; padding: 15px 10px; margin-bottom: 10px; border-bottom: 1px solid #eee; }
        .category-grid { display: flex; overflow-x: auto; white-space: nowrap; gap: 15px; padding-bottom: 5px; }
        .cat-item { display: flex; flex-direction: column; align-items: center; text-decoration: none; color: #444; font-size: 11px; font-weight: bold; min-width: 75px; cursor: pointer; background: none; border: none; }
        .cat-icon { width: 52px; height: 52px; background: #fff1f2; color: #e63946; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 20px; margin-bottom: 6px; border: 1px solid #ffe4e6; }
        .cat-item.active-cat .cat-icon { background: #e63946; color: white; }
        .tab-content { padding: 0 12px; display: none; }
        .tab-content.active-tab { display: block; }
        .products-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; padding: 10px 0; }
        .product-card { background: white; padding: 10px; border: 1px solid #f1f5f9; border-radius: 8px; position: relative; }
        .product-img-box { width: 100%; height: 170px; display: flex; align-items: center; justify-content: center; background: #f8f8f8; overflow: hidden; border-radius: 4px; }
        .prod-action-overlay { position: absolute; top: 8px; right: 8px; display: flex; flex-direction: column; gap: 8px; }
        .action-circle-btn { width: 32px; height: 32px; background: rgba(255,255,255,0.9); border: none; border-radius: 50%; color: #64748b; cursor: pointer; }
        .earn-container { background: white; padding: 20px; border-radius: 12px; margin-top: 15px; }
        .camera-btn { width: 100%; background: #475569; color: white; border: none; padding: 12px; border-radius: 6px; font-weight: bold; cursor: pointer; margin-bottom: 10px; }
        .submit-btn { width: 100%; background: #e63946; color: white; border: none; padding: 14px; border-radius: 6px; font-weight: bold; }
        .bottom-nav { position: fixed; bottom: 0; left: 0; right: 0; background: white; height: 65px; display: flex; justify-content: space-around; align-items: center; border-top: 1px solid #eee; z-index: 1000; }
        .nav-item { display: flex; flex-direction: column; align-items: center; color: #777; font-size: 11px; cursor: pointer; border: none; background: none; }
    </style>
</head>
<body>
  <header>Super Shopping</header>
<div class="search-container"><input type="text" class="search-box" id="searchInput" placeholder="Search..."></div>
<div id="home-tab" class="tab-content active-tab">
    <div class="category-grid" style="display:flex; overflow-x:auto;">
        <button class="cat-item active-cat" id="cat-all"><div class="cat-icon"><i class="fa-solid fa-border-all"></i></div>For You</button>
        <button class="cat-item" id="cat-cloths"><div class="cat-icon"><i class="fa-solid fa-shirt"></i></div>Cloths</button>
    </div>
    <div class="products-grid" id="productsGrid">
        <div class="product-card" data-category="cloths" id="tshirtCard">
            <div class="prod-action-overlay"><button class="action-circle-btn" onclick="toggleLike(event, 'tshirtCard', 'Maroon T-Shirt', 'img1.jpg', '₹243')"><i class="fa-solid fa-heart"></i></button></div>
            <div class="product-img-box"><img src="WhatsApp Image 2026-06-03 at 14.17.33 (1).jpeg" style="max-width:100%;"></div>
            <div class="product-name">AUSK Men's Maroon Graphic T-Shirt</div>
        </div>
    </div>
</div>
<div id="earn-tab" class="tab-content">
    <div class="earn-container">
        <h3>Submit Proof</h3>
        <input type="text" class="form-input" id="orderIdInput" placeholder="Order ID">
        <button class="camera-btn" onclick="alert('Camera')">Live Bill Photo</button>
        <button class="camera-btn" onclick="alert('Camera')">Product Photo (Optional)</button>
        <button class="submit-btn" onclick="submitOrderProof()">Submit</button>
    </div>
</div>
<div id="account-tab" class="tab-content">
    <div id="profileDisplayView">
        <div id="profAvatar" style="width:80px; height:80px; border-radius:50%; background:#eee; margin:auto;"></div>
        <div id="displayFullName">Nitish Maurya</div>
        <button onclick="openProfileEdit()">Edit Profile</button>
    </div>
    <div id="profileEditFormView" style="display:none;">
        <input type="text" id="editName" placeholder="Name">
        <input type="file" id="galleryPhotoSelector" onchange="loadProfileImage(this)">
        <button onclick="saveProfileChanges()">Save</button>
    </div>
</div>
<nav class="bottom-nav">
    <button class="nav-item active" data-tab="home-tab"><i class="fa-solid fa-house"></i><span>Home</span></button>
    <button class="nav-item" data-tab="earn-tab"><i class="fa-solid fa-gift"></i><span>Earn</span></button>
    <button class="nav-item" data-tab="account-tab"><i class="fa-solid fa-user"></i><span>Account</span></button>
</nav>
<script>
    function toggleLike(e, id, name, img, price) {
        e.stopPropagation();
        e.currentTarget.style.color = (e.currentTarget.style.color === "red") ? "#64748b" : "red";
    }
    function openProfileEdit() {
        document.getElementById('profileDisplayView').style.display = 'none';
        document.getElementById('profileEditFormView').style.display = 'block';
    }
    function saveProfileChanges() {
        document.getElementById('displayFullName').innerText = document.getElementById('editName').value;
        document.getElementById('profileEditFormView').style.display = 'none';
        document.getElementById('profileDisplayView').style.display = 'block';
    }
    function loadProfileImage(input) {
        if (input.files && input.files[0]) {
            const reader = new FileReader();
            reader.onload = function(e) { document.getElementById('profAvatar').innerHTML = `<img src="${e.target.result}" style="width:100%; height:100%; border-radius:50%; object-fit:cover;">`; };
            reader.readAsDataURL(input.files[0]);
        }
    }
    document.querySelectorAll('.nav-item').forEach(btn => {
        btn.addEventListener('click', function() {
            document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active-tab'));
            document.getElementById(this.getAttribute('data-tab')).classList.add('active-tab');
        });
    });
</script>
</body>
</html>
