<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Super Shopping</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; font-family: sans-serif; }
body { background: #f7f9fa; padding-bottom: 80px; }
.tab-content { display: none; padding: 15px; }
.active-tab { display: block; }
.bottom-nav { position: fixed; bottom: 0; width: 100%; background: #fff; display: flex; justify-content: space-around; padding: 15px; border-top: 2px solid #e63946; }
.nav-btn { background: none; border: none; font-size: 14px; color: #333; display: flex; flex-direction: column; align-items: center; }
.upload-form { background: white; padding: 20px; border-radius: 10px; }
</style>
</head>
<body>
    <div id="home-tab" class="tab-content active-tab"><h1>Home</h1></div>
<div id="earn-tab" class="tab-content">
<div class="upload-form">
<h3>Order Verification</h3>
<input type="text" placeholder="Order ID" style="width:100%; padding:10px; margin:5px 0;">
<input type="text" placeholder="Product ID" style="width:100%; padding:10px; margin:5px 0;">
<button onclick="alert('Upload Screenshot')" style="width:100%; padding:10px; margin:5px 0;">Upload Screenshot</button>
<button onclick="alert('Open Camera')" style="width:100%; padding:10px; margin:5px 0;">Live Bill Photo</button>
<button onclick="alert('Open Camera')" style="width:100%; padding:10px; margin:5px 0;">Live Product Photo</button>
<label><input type="checkbox" id="check"> I agree to Penalty Rules</label>
<button onclick="if(document.getElementById('check').checked){alert('Submitted! Wait 48 hrs');}else{alert('Tick the box');}" style="width:100%; padding:15px; background:red; color:white; border:none; margin-top:10px;">Submit</button>
</div>
</div>
<div id="ebook-tab" class="tab-content"><h1>Ebooks</h1></div>
<div id="wallet-tab" class="tab-content"><h1>Wallet</h1></div>
<div id="account-tab" class="tab-content"><h1>Account</h1></div>
<nav class="bottom-nav">
<button class="nav-btn" onclick="show('home-tab')"><i class="fa fa-home"></i>Home</button>
<button class="nav-btn" onclick="show('earn-tab')"><i class="fa fa-gift"></i>Earn</button>
<button class="nav-btn" onclick="show('ebook-tab')"><i class="fa fa-book"></i>Ebook</button>
<button class="nav-btn" onclick="show('wallet-tab')"><i class="fa fa-wallet"></i>Wallet</button>
<button class="nav-btn" onclick="show('account-tab')"><i class="fa fa-user"></i>Account</button>
</nav>
<script>
function show(id) {
document.querySelectorAll('.tab-content').forEach(t => t.style.display = 'none');
document.getElementById(id).style.display = 'block';
}
</script>
</body>
</html>
